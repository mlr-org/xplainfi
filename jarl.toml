[lint]
# https://jarl.etiennebacher.com/rules
select = ["PERF", "CORR", "READ", "SUSP", "TESTTHAT"]
# If "--fix" is used, only apply automatic fixes to these groups
fixable = ["PERF", "CORR", "TESTTHAT"]
# Exclude one or several specific files.
# exclude = ["R/my_custom_autogenerated_file.R"]
# Use the default set of excluded files (mostly files that are automatically generated by other tools).
default-exclude = true
# check-roxygen = true
# fix-roxygen = false

# Options for jarl 0.4.0, need to change in next update 
assignment = "="
# [lint.assignment]
# operator = "=" # mlr3 default

# [lint.quotes]
# quote = "double" # or "single"

